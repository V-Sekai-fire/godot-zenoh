name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  GODOT_VERSION: "4.6-stable"

jobs:
  # ── Build Godot from source ──────────────────────────────────────────────────
  # Oldest 4.6 release: 4.6-stable. Builds single and double precision editors.
  # Results are cached by version+platform+arch+precision so rebuilds are free.
  build-godot:
    name: Build Godot (${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.precision }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linuxbsd
            arch: x86_64
            precision: single
            artifact: godot-linux-x64-single
          - os: ubuntu-latest
            platform: linuxbsd
            arch: x86_64
            precision: double
            artifact: godot-linux-x64-double
          - os: macos-latest
            platform: macos
            arch: arm64
            precision: single
            artifact: godot-macos-arm64-single
          - os: macos-latest
            platform: macos
            arch: arm64
            precision: double
            artifact: godot-macos-arm64-double
          - os: windows-latest
            platform: windows
            arch: x86_64
            precision: single
            artifact: godot-windows-x64-single
          - os: windows-latest
            platform: windows
            arch: x86_64
            precision: double
            artifact: godot-windows-x64-double

    steps:
      - name: Restore Godot binary cache
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: godot-bin
          key: godot-${{ env.GODOT_VERSION }}-${{ matrix.platform }}-${{ matrix.arch }}-${{ matrix.precision }}

      - name: Install Linux build dependencies
        if: runner.os == 'Linux' && steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential scons python3 pkg-config \
            libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev \
            libxi-dev libxext-dev libgl-dev libglu-dev \
            libasound2-dev libpulse-dev libfreetype6-dev libssl-dev \
            libx11-xcb-dev libxkbcommon-dev

      - name: Install macOS build dependencies
        if: runner.os == 'macOS' && steps.cache-godot.outputs.cache-hit != 'true'
        run: brew install scons

      - name: Install Windows build dependencies
        if: runner.os == 'Windows' && steps.cache-godot.outputs.cache-hit != 'true'
        run: pip install scons

      - name: Clone Godot source
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          git clone --depth 1 --branch "${{ env.GODOT_VERSION }}" \
            https://github.com/godotengine/godot.git godot-src

      - name: Build Godot (single precision, Unix)
        if: steps.cache-godot.outputs.cache-hit != 'true' && matrix.precision == 'single' && runner.os != 'Windows'
        run: |
          scons -C godot-src \
            platform=${{ matrix.platform }} \
            target=editor \
            arch=${{ matrix.arch }} \
            vulkan=no \
            -j$(nproc 2>/dev/null || sysctl -n hw.logicalcpu)

      - name: Build Godot (double precision, Unix)
        if: steps.cache-godot.outputs.cache-hit != 'true' && matrix.precision == 'double' && runner.os != 'Windows'
        run: |
          scons -C godot-src \
            platform=${{ matrix.platform }} \
            target=editor \
            arch=${{ matrix.arch }} \
            precision=double \
            vulkan=no \
            -j$(nproc 2>/dev/null || sysctl -n hw.logicalcpu)

      - name: Build Godot (single precision, Windows)
        if: steps.cache-godot.outputs.cache-hit != 'true' && matrix.precision == 'single' && runner.os == 'Windows'
        run: |
          scons -C godot-src `
            platform=${{ matrix.platform }} `
            target=editor `
            arch=${{ matrix.arch }} `
            vulkan=no `
            d3d12=no `
            "-j$([Environment]::ProcessorCount)"

      - name: Build Godot (double precision, Windows)
        if: steps.cache-godot.outputs.cache-hit != 'true' && matrix.precision == 'double' && runner.os == 'Windows'
        run: |
          scons -C godot-src `
            platform=${{ matrix.platform }} `
            target=editor `
            arch=${{ matrix.arch }} `
            precision=double `
            vulkan=no `
            d3d12=no `
            "-j$([Environment]::ProcessorCount)"

      - name: Collect binary (Unix)
        if: steps.cache-godot.outputs.cache-hit != 'true' && runner.os != 'Windows'
        run: |
          mkdir -p godot-bin
          if [ "${{ matrix.precision }}" = "double" ]; then
            bin=$(ls godot-src/bin/ | grep "editor" | grep "double" | grep "${{ matrix.arch }}" | head -1)
            out="godot.double"
          else
            bin=$(ls godot-src/bin/ | grep "editor" | grep -v "double" | grep "${{ matrix.arch }}" | head -1)
            out="godot"
          fi
          echo "Copying godot-src/bin/$bin -> godot-bin/$out"
          cp "godot-src/bin/$bin" "godot-bin/$out"
          chmod +x "godot-bin/$out"

      - name: Collect binary (Windows)
        if: steps.cache-godot.outputs.cache-hit != 'true' && runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path godot-bin | Out-Null
          if ("${{ matrix.precision }}" -eq "double") {
            $bin = Get-ChildItem godot-src/bin | Where-Object { $_.Name -match "editor" -and $_.Name -match "double" -and $_.Name -match "${{ matrix.arch }}" } | Select-Object -First 1
            $out = "godot.double.exe"
          } else {
            $bin = Get-ChildItem godot-src/bin | Where-Object { $_.Name -match "editor" -and $_.Name -notmatch "double" -and $_.Name -match "${{ matrix.arch }}" } | Select-Object -First 1
            $out = "godot.exe"
          }
          Write-Output "Copying $($bin.Name) -> godot-bin/$out"
          Copy-Item $bin.FullName "godot-bin/$out"

      - name: Upload Godot binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: godot-bin/
          retention-days: 7

  # ── Rust extension tests (single + double precision) ─────────────────────────
  test:
    name: Test Extension (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Double-precision extension build needs a Godot binary from build-godot.
    # Single-precision is independent (uses bundled api-4-6).
    needs: [build-godot]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Install zenohd
        run: cargo install zenohd

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check
        if: runner.os != 'Windows'

      - name: Lint (single precision)
        run: cargo clippy -- -D warnings
        if: runner.os != 'Windows'

      # ── Single-precision extension ─────────────────────────────────────────
      - name: Build extension (single precision)
        run: ./misc/build.sh
        env:
          PRECISION: single
        if: runner.os != 'Windows'

      - name: Build extension (single precision, Windows)
        run: cargo build --release
        if: runner.os == 'Windows'

      # ── Double-precision extension (Linux + macOS only) ────────────────────
      - name: Download Godot double-precision binary (Linux)
        if: runner.os == 'Linux'
        uses: actions/download-artifact@v4
        with:
          name: godot-linux-x64-double
          path: misc/godot-bin

      - name: Download Godot double-precision binary (macOS)
        if: runner.os == 'macOS'
        uses: actions/download-artifact@v4
        with:
          name: godot-macos-arm64-double
          path: misc/godot-bin

      - name: Download Godot double-precision binary (Windows)
        if: runner.os == 'Windows'
        uses: actions/download-artifact@v4
        with:
          name: godot-windows-x64-double
          path: misc/godot-bin

      - name: Mark Godot binary executable (Unix)
        if: runner.os != 'Windows'
        run: chmod +x misc/godot-bin/godot.double 2>/dev/null || true

      - name: Lint (double precision, Unix)
        if: runner.os != 'Windows'
        run: cargo clippy --features double-precision -- -D warnings
        env:
          GODOT4_BIN: ${{ github.workspace }}/misc/godot-bin/godot.double

      - name: Lint (double precision, Windows)
        if: runner.os == 'Windows'
        run: cargo clippy --features double-precision -- -D warnings
        env:
          GODOT4_BIN: ${{ github.workspace }}\misc\godot-bin\godot.double.exe

      - name: Build extension (double precision)
        if: runner.os != 'Windows'
        run: ./misc/build.sh
        env:
          PRECISION: double
          GODOT4_BIN: ${{ github.workspace }}/misc/godot-bin/godot.double

      - name: Build extension (double precision, Windows)
        if: runner.os == 'Windows'
        run: cargo build --release --features double-precision
        env:
          GODOT4_BIN: ${{ github.workspace }}\misc\godot-bin\godot.double.exe

      # ── Tests ──────────────────────────────────────────────────────────────
      - name: Run tests
        run: cargo test --verbose

      - name: Run integration tests
        run: cargo test --verbose --test integration

      - name: Run peer tests
        run: cargo test --verbose --test peer_tests

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        run: cargo audit --ignore RUSTSEC-2023-0071

  # ── Release artifacts (single + double) ────────────────────────────────────
  release-artifacts:
    name: Release Artifacts (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    needs: [test, security-audit, build-godot]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x64-single
            godot_artifact: godot-linux-x64-double
          - os: ubuntu-latest
            name: linux-x64-double
            godot_artifact: godot-linux-x64-double
          - os: macos-latest
            name: macos-arm64-single
            godot_artifact: godot-macos-arm64-double
          - os: macos-latest
            name: macos-arm64-double
            godot_artifact: godot-macos-arm64-double
          - os: windows-latest
            name: windows-x64-single
            godot_artifact: ""
          - os: windows-latest
            name: windows-x64-double
            godot_artifact: godot-windows-x64-double

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2

      - name: Download Godot double-precision binary
        if: matrix.godot_artifact != ''
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.godot_artifact }}
          path: misc/godot-bin

      - name: Mark Godot binary executable
        if: runner.os != 'Windows'
        run: chmod +x misc/godot-bin/godot.double 2>/dev/null || true

      - name: Build release (single precision)
        if: "!contains(matrix.name, 'double') && runner.os != 'Windows'"
        run: ./misc/build.sh
        env:
          PRECISION: single

      - name: Build release (double precision)
        if: contains(matrix.name, 'double') && runner.os != 'Windows'
        run: ./misc/build.sh
        env:
          PRECISION: double
          GODOT4_BIN: ${{ github.workspace }}/misc/godot-bin/godot.double

      - name: Build release (Windows single precision)
        if: runner.os == 'Windows' && !contains(matrix.name, 'double')
        run: cargo build --release

      - name: Build release (Windows double precision)
        if: runner.os == 'Windows' && contains(matrix.name, 'double')
        run: cargo build --release --features double-precision
        env:
          GODOT4_BIN: ${{ github.workspace }}\misc\godot-bin\godot.double.exe

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: godot-zenoh-${{ matrix.name }}
          path: sample/addons/godot-zenoh/libgodot_zenoh*

  quality-assurance:
    name: Quality Assurance
    runs-on: ubuntu-latest
    needs: [test]
    if: success()
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Generate code coverage
        run: cargo tarpaulin --verbose --ignore-tests --out Html --output-dir ./coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/cobertura.xml
          fail_ci_if_error: false

  create-pr-comment:
    name: Create PR Comment
    runs-on: ubuntu-latest
    needs: [test, security-audit, quality-assurance]
    if: github.event_name == 'pull_request' && success()
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ **CI/CD Pipeline Passed!**\n\nAll automated checks completed successfully:\n\n- ✅ **Rust Tests**: All unit/integration/peer tests passed (single + double precision)\n- ✅ **Godot Builds**: 4.6-stable single + double precision binaries built and cached\n- ✅ **Security Audit**: No vulnerabilities detected\n- ✅ **Code Quality**: Formatting, linting, and coverage verified\n- ✅ **Cross-Platform**: Ubuntu, macOS, Windows builds successful\n\nReady for merge! 🚀'
            })
